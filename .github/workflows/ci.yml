name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────
  # Backend: lint + test
  # ─────────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ghostwire_test
          POSTGRES_USER: ghostwire
          POSTGRES_PASSWORD: testpassword
          POSTGRES_HOST_AUTH_METHOD: scram-sha-256
          POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ghostwire -d ghostwire_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://ghostwire:testpassword@localhost:5432/ghostwire_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-ci
          ENCRYPTION_KEY: test-encryption-key-32-chars-min!!
          INTERNAL_AUTH_TOKEN: test-internal-token
          BACKUP_PATH: /tmp/ghostwire-backups
        run: |
          python -m pytest tests/ -v --tb=short -q

  # ─────────────────────────────────────────────
  # Frontend: lint + build
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8089
        run: npm run build

  # ─────────────────────────────────────────────
  # Docker: build all images (no push)
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push'

    strategy:
      matrix:
        service: [backend, frontend, proxy, updater]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.service }}
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          tags: ghostwire-proxy-${{ matrix.service }}:${{ github.sha }}
