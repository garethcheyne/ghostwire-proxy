name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────
  # Validate: run full test suite before release
  # ─────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ghostwire_test
          POSTGRES_USER: ghostwire
          POSTGRES_PASSWORD: testpassword
          POSTGRES_HOST_AUTH_METHOD: scram-sha-256
          POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ghostwire -d ghostwire_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://ghostwire:testpassword@localhost:5432/ghostwire_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-ci
          ENCRYPTION_KEY: test-encryption-key-32-chars-min!!
          INTERNAL_AUTH_TOKEN: test-internal-token
          BACKUP_PATH: /tmp/ghostwire-backups
        run: |
          pip install -r requirements.txt
          python -m pytest tests/ -v --tb=short -q

      - name: Frontend build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8089
        run: |
          npm ci
          npm run lint
          npx tsc --noEmit
          npm run build

  # ─────────────────────────────────────────────
  # Release: create GitHub release with changelog
  # ─────────────────────────────────────────────
  release:
    name: Create Release
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify VERSION file matches tag
        run: |
          file_version=$(cat VERSION | tr -d '[:space:]')
          tag_version="${{ steps.version.outputs.version }}"
          if [ "$file_version" != "$tag_version" ]; then
            echo "ERROR: VERSION file ($file_version) does not match tag ($tag_version)"
            exit 1
          fi

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$GITHUB_REF_NAME" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "## Changes since ${PREV_TAG}" > changelog.md
          echo "" >> changelog.md

          # Group commits by type (conventional commits)
          for type_label in "feat:Features" "fix:Bug Fixes" "perf:Performance" "refactor:Refactoring" "docs:Documentation" "chore:Maintenance"; do
            type="${type_label%%:*}"
            label="${type_label##*:}"
            commits=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --grep="^${type}" 2>/dev/null || true)
            if [ -n "$commits" ]; then
              echo "### ${label}" >> changelog.md
              echo "$commits" >> changelog.md
              echo "" >> changelog.md
            fi
          done

          # Uncategorized commits
          all_commits=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" 2>/dev/null || true)
          if [ -n "$all_commits" ]; then
            echo "### All Changes" >> changelog.md
            echo "$all_commits" >> changelog.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Ghostwire Proxy v${{ steps.version.outputs.version }}"
          body_path: changelog.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
