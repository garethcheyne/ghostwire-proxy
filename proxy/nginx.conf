worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /usr/local/openresty/nginx/conf/mime.types;
    default_type application/octet-stream;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Logging format - JSON for easy parsing
    log_format json_combined escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"remote_user":"$remote_user",'
        '"request_method":"$request_method",'
        '"request_uri":"$request_uri",'
        '"query_string":"$query_string",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"upstream_addr":"$upstream_addr",'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"host":"$host",'
        '"server_name":"$server_name",'
        '"ssl_protocol":"$ssl_protocol",'
        '"ssl_cipher":"$ssl_cipher"'
    '}';

    access_log /var/log/nginx/access.log json_combined;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Real IP - trust Docker networks and common private ranges
    # so X-Forwarded-For from upstream LB / Docker gateway is used
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from 127.0.0.0/8;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Buffer sizes
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    client_max_body_size 100m;
    large_client_header_buffers 4 8k;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript application/x-javascript;

    # SSL defaults
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 127.0.0.11 8.8.8.8 8.8.4.4 valid=300s ipv6=off;
    resolver_timeout 5s;

    # Lua shared dictionaries
    lua_shared_dict auth_sessions 10m;
    lua_shared_dict rate_limit 50m;
    lua_shared_dict threat_cache 20m;
    lua_shared_dict waf_cache 10m;
    lua_shared_dict config_cache 5m;

    # Lua package path
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;/usr/local/openresty/lualib/?.lua;;";
    lua_package_cpath "/usr/local/openresty/lualib/?.so;;";

    # Initialize Lua modules
    init_by_lua_block {
        -- Load configuration
        require "init"
    }

    init_worker_by_lua_block {
        -- Worker initialization: load rules from API and set up periodic reload
        local init = require "init"

        -- Delay initial load to give the API time to start
        ngx.timer.at(5, function(premature)
            if premature then return end
            ngx.log(ngx.INFO, "Worker ", ngx.worker.id(), ": initial rule load from API")
            init.reload_all_rules()
        end)

        -- Only worker 0 runs the periodic reload timer to avoid duplicate work
        if ngx.worker.id() == 0 then
            local function reload_timer(premature)
                if premature then return end
                init.reload_all_rules()
                -- Reschedule
                local ok, err = ngx.timer.at(init.config.rule_reload_interval, reload_timer)
                if not ok then
                    ngx.log(ngx.ERR, "Failed to reschedule rule reload timer: ", err)
                end
            end

            -- Start the periodic reload (first run after initial load + interval)
            ngx.timer.at(init.config.rule_reload_interval + 5, reload_timer)
            ngx.log(ngx.INFO, "Worker 0: rule reload timer started (every ",
                init.config.rule_reload_interval, "s)")
        end
    }

    # Health check endpoint
    server {
        listen 80;
        server_name localhost;

        location /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        location /nginx-status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            deny all;
        }

        # ACME challenge for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }

    # Include proxy host configurations (includes _default.conf catch-all)
    include /etc/nginx/conf.d/proxy-hosts/*.conf;
}
