# Default server block - catches all unmatched requests
# This file is overwritten at runtime by the API when configs are generated

server {
    listen 80 default_server;
    server_name _;

    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    location / {
        return 444;
    }
}
