services:
  # PostgreSQL Database (hardened — no external access)
  ghostwire-proxy-postgres:
    image: postgres:16-alpine
    container_name: ghostwire-proxy-postgres
    restart: unless-stopped
    # No ports exposed — only reachable from internal network
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-ghostwire_proxy}
      - POSTGRES_USER=${POSTGRES_USER:-ghostwire}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256 --auth-local=scram-sha-256
      - POSTGRES_HOST_AUTH_METHOD=scram-sha-256
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ghostwire-proxy-network
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /run/postgresql
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ghostwire} -d ${POSTGRES_DB:-ghostwire_proxy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # OpenResty Reverse Proxy (Ports 80, 443)
  ghostwire-proxy-nginx:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    container_name: ghostwire-proxy-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - INTERNAL_AUTH_TOKEN=${INTERNAL_AUTH_TOKEN}
    volumes:
      - ./data/certificates:/etc/nginx/certs:ro
      - ./data/nginx-configs:/etc/nginx/conf.d/proxy-hosts:ro
      - proxy-cache:/var/cache/nginx
      - certbot-webroot:/var/www/certbot:ro
      - ./proxy/lua:/usr/local/openresty/nginx/lua:ro
      - ./data/geoip:/data/geoip:ro
    networks:
      - ghostwire-proxy-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '2.0'
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Admin UI - Next.js (Port 88)
  ghostwire-proxy-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ghostwire-proxy-ui
    restart: unless-stopped
    ports:
      - "88:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
      - BACKEND_URL=http://ghostwire-proxy-api:8000
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:88}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
    depends_on:
      ghostwire-proxy-api:
        condition: service_healthy
    networks:
      - ghostwire-proxy-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API - FastAPI (Port 8089 external, 8000 internal)
  ghostwire-proxy-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ghostwire-proxy-api
    restart: unless-stopped
    ports:
      - "8089:8000"
    environment:
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ghostwire}:${POSTGRES_PASSWORD}@ghostwire-proxy-postgres:5432/${POSTGRES_DB:-ghostwire_proxy}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:88,http://localhost:3000}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:-}
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL:-}
      - GHOSTWIRE_API_URL=${GHOSTWIRE_API_URL:-}
      - GHOSTWIRE_API_KEY=${GHOSTWIRE_API_KEY:-}
      - REDIS_URL=redis://ghostwire-proxy-redis:6379
      - INTERNAL_AUTH_TOKEN=${INTERNAL_AUTH_TOKEN}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_EMAIL=${VAPID_EMAIL:-mailto:admin@ghostwire.local}
    depends_on:
      ghostwire-proxy-postgres:
        condition: service_healthy
      ghostwire-proxy-redis:
        condition: service_healthy
    volumes:
      - ./data/certificates:/data/certificates
      - ./data/nginx-configs:/data/nginx-configs
      - ./data/letsencrypt:/etc/letsencrypt
      - ./data/backups:/data/backups
      - ./data/geoip:/data/geoip
      - certbot-webroot:/var/www/certbot
    networks:
      - ghostwire-proxy-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Certbot for Let's Encrypt (runs renewal check every 12 hours)
  ghostwire-proxy-certbot:
    build:
      context: ./certbot
      dockerfile: Dockerfile
    container_name: ghostwire-proxy-certbot
    restart: unless-stopped
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    volumes:
      - ./data/letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    networks:
      - ghostwire-proxy-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  # Redis for caching and queues (hardened — no external access)
  ghostwire-proxy-redis:
    image: redis:7-alpine
    container_name: ghostwire-proxy-redis
    restart: unless-stopped
    # No ports exposed — only reachable from internal network
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - ghostwire-proxy-network
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Updater Sidecar - manages self-updates
  ghostwire-proxy-updater:
    build:
      context: ./updater
      dockerfile: Dockerfile
    container_name: ghostwire-proxy-updater
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://ghostwire-proxy-redis:6379
      - API_URL=http://ghostwire-proxy-api:8000
      - COMPOSE_PROJECT_DIR=/app/project
      - BACKUP_PATH=/data/backups
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - INTERNAL_AUTH_TOKEN=${INTERNAL_AUTH_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # Write access for updates
      - .:/app/project:ro                          # Project source (read-only)
      - ./data/backups:/data/backups               # For pre-update backups
    networks:
      - ghostwire-proxy-network
    depends_on:
      ghostwire-proxy-redis:
        condition: service_healthy
      ghostwire-proxy-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

networks:
  ghostwire-proxy-network:
    name: ghostwire-proxy-network
    driver: bridge
    internal: false
    attachable: false

volumes:
  proxy-cache:
    name: ghostwire-proxy-cache
  certbot-webroot:
    name: ghostwire-proxy-certbot-webroot
  redis-data:
    name: ghostwire-proxy-redis-data
  postgres-data:
    name: ghostwire-proxy-postgres-data
